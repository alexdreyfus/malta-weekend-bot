name: Daily Malta Idle-Jet Radar

on:
  schedule:
    # 4x/day, every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: {}   # manual test trigger from the Actions tab

jobs:
  idle-jets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests airportsdata

      - name: Run idle-jet radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          AEROAPI_KEY: ${{ secrets.AEROAPI_KEY }}   # optional; flight plans + inbound
          FR24_TOKEN: ${{ secrets.FR24_TOKEN }}     # optional; friends-fleet location
          # Optional tuning:
          # LOOKBACK_DAYS: "6"
          # MIN_DWELL_DAYS: "1.0"
          # JETS_ONLY: "1"
          # REQUIRE_TAIL: "1"
          # SEND_EMPTY: "1"
        run: python idle_jets_bot.py
