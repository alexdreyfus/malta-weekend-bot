name: Daily Malta Idle-Jet Radar

on:
  schedule:
    # 06:00 UTC = 07:00 Malta (winter) / 08:00 (summer). Edit to taste.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # lets you trigger a manual test run from the Actions tab

jobs:
  idle-jets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests

      - name: Run idle-jet radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENSKY_CLIENT_ID: ${{ secrets.OPENSKY_CLIENT_ID }}
          OPENSKY_CLIENT_SECRET: ${{ secrets.OPENSKY_CLIENT_SECRET }}
          # Optional tuning (uncomment to override defaults):
          # LOOKBACK_DAYS: "6"
          # MIN_DWELL_DAYS: "1.0"
          # JETS_ONLY: "1"
          # SEND_EMPTY: "1"
        run: python idle_jets_bot.py
